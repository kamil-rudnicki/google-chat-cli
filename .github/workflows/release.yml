name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "${cargo_version}" != "${tag_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi
          echo "version=${cargo_version}" >> "${GITHUB_OUTPUT}"

  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  artifacts:
    name: Build release artifacts
    needs:
      - validate
      - release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build-tool: cargo
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build-tool: cross
          - os: macos-latest
            target: x86_64-apple-darwin
            build-tool: cargo
          - os: macos-latest
            target: aarch64-apple-darwin
            build-tool: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build-tool: cargo
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: gchat
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          locked: true
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew tap
    needs:
      - validate
      - artifacts
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Skip when tap token is missing
        if: ${{ env.TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap update."

      - name: Download Homebrew release archives
        if: ${{ env.TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "gchat-aarch64-apple-darwin.tar.gz" \
            --pattern "gchat-aarch64-unknown-linux-gnu.tar.gz" \
            --pattern "gchat-x86_64-apple-darwin.tar.gz" \
            --pattern "gchat-x86_64-unknown-linux-gnu.tar.gz" \
            --dir dist
          shasum -a 256 dist/*.tar.gz

      - name: Checkout tap
        if: ${{ env.TAP_TOKEN != '' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/homebrew-gchat
          token: ${{ env.TAP_TOKEN }}
          path: tap

      - name: Update formula
        if: ${{ env.TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          MACOS_ARM_SHA="$(shasum -a 256 dist/gchat-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
          MACOS_INTEL_SHA="$(shasum -a 256 dist/gchat-x86_64-apple-darwin.tar.gz | awk '{print $1}')"
          LINUX_ARM_SHA="$(shasum -a 256 dist/gchat-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')"
          LINUX_INTEL_SHA="$(shasum -a 256 dist/gchat-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')"
          REPO="${GITHUB_REPOSITORY}"
          cat > tap/Formula/gchat.rb <<RUBY
          class Gchat < Formula
            desc "Script-first Google Chat CLI"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/v${VERSION}/gchat-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM_SHA}"
              else
                url "https://github.com/${REPO}/releases/download/v${VERSION}/gchat-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_INTEL_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/v${VERSION}/gchat-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              else
                url "https://github.com/${REPO}/releases/download/v${VERSION}/gchat-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_INTEL_SHA}"
              end
            end

            def install
              bin.install "gchat"
            end

            test do
              output = shell_output("#{bin}/gchat --version")
              assert_match '"ok": true', output
            end
          end
          RUBY

      - name: Commit formula
        if: ${{ env.TAP_TOKEN != '' }}
        shell: bash
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gchat.rb
          git commit -m "Update gchat to ${VERSION}" || exit 0
          git push
